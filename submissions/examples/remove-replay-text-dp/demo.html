<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clean Click-to-Replay Animations — EaseMotion CSS</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Clean Preview Interaction</h1>
      <p class="description">
        Click anywhere inside a preview card to replay its animation. The
        redundant "Replay" text buttons have been removed for a premium,
        minimalist feel.
      </p>

      <div class="grid">
        <div
          class="preview-card"
          onclick="replayAnimation(this, 'animate-fade-in')"
        >
          <div class="preview-box animate-fade-in">Preview</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grayscale Filter Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

  <div class="showcase-card">
    <div class="image-box ease-filter-grayscale">
      📸 Image Placeholder

    <div class="info-box">

    </div>
  </div>

</body>
</html>
